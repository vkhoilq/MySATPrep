services:
  practicesat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: practicesat
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BASE_URL=http://localhost:3000
      - GOOGLE_SITE_VERIFICATION=
      - YANDEX_VERIFICATION=
      - YAHOO_VERIFICATION=
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.practicesat.description=PracticeSAT SAT QuestionBank Platform"
